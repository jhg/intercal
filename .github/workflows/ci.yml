name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup platform
        run: sh setup_platform.sh

      - name: Run test suite
        run: zsh tests/run_tests.sh

      - name: Run pure syslib verification
        run: zsh tests/test_syslib_pure.sh

      - name: Bootstrap (if compiler.i exists)
        if: hashFiles('compiler.i') != ''
        run: zsh bootstrap.sh

  test-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Setup platform
        run: sh setup_platform.sh

      - name: Run test suite
        run: zsh tests/run_tests.sh

      - name: Run pure syslib verification
        run: zsh tests/test_syslib_pure.sh
