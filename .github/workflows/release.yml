name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: zsh tests/run_tests.sh

      - name: Build bootstrap compiler test binary
        run: |
          echo "DO GIVE UP" | zsh src/bootstrap/intercalc.sh > /tmp/test_bin
          file /tmp/test_bin

      - name: Package macOS
        run: |
          mkdir -p dist/intercal
          cp src/bootstrap/intercalc.sh dist/intercal/
          cp src/bootstrap/codegen_x86_64.sh dist/intercal/ 2>/dev/null || true
          cp -r src/runtime dist/intercal/
          cp -r src/syslib dist/intercal/
          cp src/compiler/compiler.i dist/intercal/ 2>/dev/null || true
          cp intercal bootstrap.sh setup_platform.sh dist/intercal/
          cp README.md LICENSE dist/intercal/
          cd dist && zip -r ../intercal-macos-arm64.zip intercal/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: intercal-macos-arm64
          path: intercal-macos-arm64.zip

  build-linux:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Run tests
        run: zsh tests/run_tests.sh

      - name: Package Linux ARM64
        run: |
          mkdir -p dist/intercal
          cp src/bootstrap/intercalc.sh dist/intercal/
          cp src/bootstrap/codegen_x86_64.sh dist/intercal/ 2>/dev/null || true
          cp -r src/runtime dist/intercal/
          cp -r src/syslib dist/intercal/
          cp src/compiler/compiler.i dist/intercal/ 2>/dev/null || true
          cp intercal bootstrap.sh setup_platform.sh dist/intercal/
          cp README.md LICENSE dist/intercal/
          cd dist && tar czf ../intercal-linux-arm64.tar.gz intercal/

      - name: Build .deb package
        run: |
          mkdir -p deb/DEBIAN deb/usr/lib/intercal deb/usr/bin
          cat > deb/DEBIAN/control << 'CTRL'
          Package: intercal
          Version: ${GITHUB_REF_NAME#v}
          Architecture: arm64
          Maintainer: INTERCAL Project
          Description: Self-compiling INTERCAL compiler
           A compiler for the INTERCAL programming language that targets
           native ARM64 binaries. Includes bootstrap compiler, runtime,
           and system library.
          CTRL
          sed -i 's/^          //' deb/DEBIAN/control
          cp -r src/* deb/usr/lib/intercal/
          cp intercal deb/usr/bin/intercal
          cp bootstrap.sh setup_platform.sh deb/usr/lib/intercal/
          dpkg-deb --build deb intercal-arm64.deb 2>/dev/null || echo "deb build skipped"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: intercal-linux-arm64
          path: |
            intercal-linux-arm64.tar.gz
            intercal-arm64.deb

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          RELEASE_JSON=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"INTERCAL Compiler $TAG\",\"body\":\"Release $TAG\\n\\nIncludes bootstrap compiler for macOS ARM64 and Linux ARM64.\"}" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases")

          UPLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].replace('{?name,label}',''))")

          for f in intercal-macos-arm64/*.zip intercal-linux-arm64/*.tar.gz intercal-linux-arm64/*.deb; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f")
            MIME="application/octet-stream"
            [[ "$NAME" == *.zip ]] && MIME="application/zip"
            [[ "$NAME" == *.tar.gz ]] && MIME="application/gzip"
            [[ "$NAME" == *.deb ]] && MIME="application/vnd.debian.binary-package"
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: $MIME" \
              --data-binary @"$f" \
              "${UPLOAD_URL}?name=$NAME"
            echo "Uploaded: $NAME"
          done
