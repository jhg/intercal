name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check platform
        run: sh setup_platform.sh

      - name: Run test suite
        run: zsh tests/run_tests.sh

      - name: Run pure syslib verification
        run: zsh tests/test_syslib_pure.sh

      - name: Bootstrap (if compiler ready)
        if: hashFiles('src/compiler/compiler.i') != ''
        run: zsh bootstrap.sh

  test-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Check platform
        run: sh setup_platform.sh

      - name: Run test suite
        run: zsh tests/run_tests.sh

      - name: Run pure syslib verification
        if: success()
        run: zsh tests/test_syslib_pure.sh

  test-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Check platform
        run: sh setup_platform.sh

      - name: Run test suite
        run: zsh tests/run_tests.sh

      - name: Run pure syslib verification
        if: success()
        run: zsh tests/test_syslib_pure.sh
