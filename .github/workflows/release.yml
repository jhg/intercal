name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run test suite
        run: zsh tests/run_tests.sh

      - name: Bootstrap (if compiler.i exists)
        if: hashFiles('compiler.i') != ''
        run: zsh bootstrap.sh

      - name: Prepare release binary
        run: |
          if [[ -f intercal_core ]]; then
            cp intercal_core intercal-macos-arm64
          else
            echo "No self-hosted compiler yet. Packaging bootstrap test binary."
            echo "DO GIVE UP" | zsh intercalc.sh > intercal-macos-arm64
          fi
          chmod +x intercal-macos-arm64

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # Create release via REST API (no gh cli)
          RELEASE_JSON=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"INTERCAL Compiler $TAG\",\"body\":\"Release $TAG\"}" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases")

          UPLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].replace('{?name,label}',''))")

          # Upload binary
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @intercal-macos-arm64 \
            "${UPLOAD_URL}?name=intercal-macos-arm64"
